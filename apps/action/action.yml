name: "Beacon — Skill Quality Gate"
description: "Grade your Claude Code skills, comment a scorecard on the PR, and gate the build below a threshold."
author: "Beacon"
branding:
  icon: "check-circle"
  color: "yellow"

inputs:
  path:
    description: "Path to a skill directory or a folder of skills (every SKILL.md is scanned)."
    required: false
    default: "."
  min-grade:
    description: "Fail the build if any skill grades below this (e.g. B, C-). Empty = report only, no gate."
    required: false
    default: ""
  comment:
    description: "Post (or update) a PR comment with the scorecard."
    required: false
    default: "true"
  anthropic-api-key:
    description: "Optional. Enables the LLM-assisted checks (triggering, verification, constraints)."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "20"

    # Single scan: emit the Markdown report AND (if a threshold is set) gate in one pass, so the
    # LLM checks aren't paid for twice. Inputs are passed via env (not `${{ }}` interpolation) to
    # avoid shell injection. `set +e` keeps a below-threshold exit from aborting the step, so the
    # comment still posts; the captured code is re-raised by the Gate step.
    - name: Beacon
      id: beacon
      shell: bash
      env:
        BEACON_PATH: ${{ inputs.path }}
        BEACON_MIN_GRADE: ${{ inputs.min-grade }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set +e
        args=("$BEACON_PATH" --markdown)
        if [ -n "$BEACON_MIN_GRADE" ]; then args+=("--min-grade=$BEACON_MIN_GRADE"); fi
        npx --yes @sgharlow/beacon@latest "${args[@]}" > "$RUNNER_TEMP/beacon-report.md"
        echo "exit=$?" >> "$GITHUB_OUTPUT"
        cat "$RUNNER_TEMP/beacon-report.md" >> "$GITHUB_STEP_SUMMARY"

    - name: Comment on PR
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPORT_FILE: ${{ runner.temp }}/beacon-report.md
      run: node "${{ github.action_path }}/comment.mjs"

    - name: Gate
      if: ${{ inputs.min-grade != '' }}
      shell: bash
      run: exit ${{ steps.beacon.outputs.exit }}
